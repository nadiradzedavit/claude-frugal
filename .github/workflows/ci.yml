name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill files exist
        run: |
          echo "Checking skill files..."
          test -f .claude/skills/slim-read.md && echo "✅ slim-read.md exists" || exit 1
          test -f .claude/skills/distill.md && echo "✅ distill.md exists" || exit 1
          test -f .claude/skills/limit-watch.md && echo "✅ limit-watch.md exists" || exit 1
          echo "✅ All skill files present"

      - name: Validate YAML frontmatter
        run: |
          echo "Validating skill frontmatter..."
          EXIT_CODE=0
          for skill in .claude/skills/*.md; do
            echo "Checking $skill..."
            if head -1 "$skill" | grep -q "^---$"; then
              echo "  ✅ Has frontmatter start"
            else
              echo "  ❌ Missing frontmatter start"
              EXIT_CODE=1
            fi
            if grep -q "^skill:" "$skill"; then
              echo "  ✅ Has skill field"
            else
              echo "  ❌ Missing skill field"
              EXIT_CODE=1
            fi
            if grep -q "^description:" "$skill"; then
              echo "  ✅ Has description field"
            else
              echo "  ❌ Missing description field"
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

  test-calculator:
    name: Test Token Calculator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run token calculator
        working-directory: ${{ github.workspace }}
        run: |
          echo "Testing token calculator..."
          python3 demo/token-calculator.py --all
          echo ""
          echo "Testing single scenario..."
          python3 demo/token-calculator.py --scenario api-development
          echo ""
          echo "Testing custom scenario..."
          python3 demo/token-calculator.py --custom --files 10 --messages 30
          echo "✅ All calculator tests passed"

      - name: Test JSON output
        working-directory: ${{ github.workspace }}
        run: |
          echo "Testing JSON output..."
          python3 demo/token-calculator.py --scenario bug-investigation --json | python3 -m json.tool
          echo "✅ JSON output valid"

  test-install:
    name: Test Installation Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test install script syntax
        run: bash -n install.sh

      - name: Run install script
        run: |
          # Create target directory first
          mkdir -p ~/.claude/skills
          # Run installer
          bash install.sh
          # Verify installation
          echo "Verifying installation..."
          ls -la ~/.claude/skills/
          test -f ~/.claude/skills/slim-read.md && echo "✅ slim-read.md installed"
          test -f ~/.claude/skills/distill.md && echo "✅ distill.md installed"
          test -f ~/.claude/skills/limit-watch.md && echo "✅ limit-watch.md installed"
          echo "✅ All skills installed successfully"

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint documentation files
        run: |
          echo "Linting markdown files (warnings only)..."
          markdownlint README.md CONTRIBUTING.md TESTING.md --config .markdownlint.json || echo "⚠️ Lint warnings found (non-blocking)"
          echo "✅ Lint check complete"

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check internal links
        run: |
          echo "Checking links (warnings only)..."
          markdown-link-check README.md --config .markdown-link-check.json || echo "⚠️ Some links may be unreachable (non-blocking)"
          echo "✅ Link check complete"
