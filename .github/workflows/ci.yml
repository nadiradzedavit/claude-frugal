name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint README
        run: markdownlint README.md --config .markdownlint.json || true
        continue-on-error: true

      - name: Lint Documentation
        run: |
          markdownlint CONTRIBUTING.md TESTING.md CHANGELOG.md SECURITY.md ROADMAP.md \
            --config .markdownlint.json || true
        continue-on-error: true

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check README links
        run: markdown-link-check README.md --config .markdown-link-check.json || true
        continue-on-error: true

  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill files exist
        run: |
          echo "Checking skill files..."
          test -f .claude/skills/slim-read.md && echo "✅ slim-read.md exists"
          test -f .claude/skills/distill.md && echo "✅ distill.md exists"
          test -f .claude/skills/limit-watch.md && echo "✅ limit-watch.md exists"

      - name: Validate YAML frontmatter
        run: |
          echo "Validating skill frontmatter..."
          for skill in .claude/skills/*.md; do
            echo "Checking $skill..."
            # Check that file starts with ---
            head -1 "$skill" | grep -q "^---$" && echo "  ✅ Has frontmatter start"
            # Check that skill: field exists
            grep -q "^skill:" "$skill" && echo "  ✅ Has skill field"
            # Check that description: field exists
            grep -q "^description:" "$skill" && echo "  ✅ Has description field"
          done

      - name: Check skill content structure
        run: |
          echo "Checking skill content..."
          for skill in .claude/skills/*.md; do
            echo "Checking $skill..."
            # Check for Instructions section
            grep -q "## Instructions" "$skill" && echo "  ✅ Has Instructions section" || echo "  ⚠️ Missing Instructions"
          done

  test-calculator:
    name: Test Token Calculator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run token calculator
        run: |
          echo "Testing token calculator..."
          python3 demo/token-calculator.py --all
          echo ""
          echo "Testing single scenario..."
          python3 demo/token-calculator.py --scenario api-development
          echo ""
          echo "Testing custom scenario..."
          python3 demo/token-calculator.py --custom --files 10 --messages 30

      - name: Test JSON output
        run: |
          echo "Testing JSON output..."
          python3 demo/token-calculator.py --scenario bug-investigation --json | python3 -m json.tool

  test-install:
    name: Test Installation Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test install script syntax
        run: bash -n install.sh

      - name: Run install script
        run: |
          # Create target directory
          mkdir -p ~/.claude/skills
          # Run installer
          bash install.sh
          # Verify installation
          ls -la ~/.claude/skills/
          test -f ~/.claude/skills/slim-read.md
          test -f ~/.claude/skills/distill.md
          test -f ~/.claude/skills/limit-watch.md
          echo "✅ All skills installed successfully"
