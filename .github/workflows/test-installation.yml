name: Test Installation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Test weekly to catch environment issues
    - cron: '0 0 * * 0'

jobs:
  test-install:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [bash, zsh]
        exclude:
          # zsh not default on Ubuntu runner
          - os: ubuntu-latest
            shell: zsh

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up shell environment
      run: |
        if [ "${{ matrix.shell }}" = "zsh" ]; then
          brew install zsh || sudo apt-get install -y zsh
        fi

    - name: Test installation script
      run: |
        ${{ matrix.shell }} install.sh
      env:
        HOME: ${{ runner.temp }}/test-home

    - name: Verify skills installed
      run: |
        ls -la ${{ runner.temp }}/test-home/.claude/skills/
        test -f ${{ runner.temp }}/test-home/.claude/skills/distill.md
        test -f ${{ runner.temp }}/test-home/.claude/skills/slim-read.md
        test -f ${{ runner.temp }}/test-home/.claude/skills/limit-watch.md

    - name: Check file permissions
      run: |
        ls -l ${{ runner.temp }}/test-home/.claude/skills/*.md | grep "rw-r--r--"

    - name: Validate skill syntax
      run: |
        # Check for required frontmatter
        for skill in ${{ runner.temp }}/test-home/.claude/skills/*.md; do
          echo "Validating $skill"
          grep -q "^---$" "$skill" || exit 1
          grep -q "^name:" "$skill" || exit 1
          grep -q "^description:" "$skill" || exit 1
          echo "✓ $skill valid"
        done

    - name: Test calculator script
      run: |
        python3 demo/token-calculator.py --scenario api-development
        python3 demo/token-calculator.py --all
        python3 demo/token-calculator.py --custom --files 10 --messages 30

    - name: Test calculator JSON output
      run: |
        python3 demo/token-calculator.py --scenario bug-investigation --json | python3 -m json.tool

  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check shell scripts
      run: |
        sudo apt-get update && sudo apt-get install -y shellcheck
        shellcheck install.sh
        shellcheck demo/interactive-demo.sh || true  # Allow warnings

    - name: Validate Markdown
      uses: DavidAnson/markdownlint-cli2-action@v16
      with:
        globs: '**/*.md'
        config: '.markdownlint.json'
      continue-on-error: true

    - name: Check for broken links
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        config-file: '.markdown-link-check.json'
      continue-on-error: true

    - name: Spell check
      uses: rojopolis/spellcheck-github-actions@0.36.0
      with:
        config_path: '.spellcheck.yml'
      continue-on-error: true

  test-demos:
    name: Test Demo Scripts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make scripts executable
      run: |
        chmod +x demo/token-calculator.py
        chmod +x demo/interactive-demo.sh

    - name: Test token calculator - all scenarios
      run: |
        python3 demo/token-calculator.py --all

    - name: Test token calculator - custom
      run: |
        python3 demo/token-calculator.py --custom --files 20 --messages 50 --distillations 2

    - name: Test JSON output format
      run: |
        python3 demo/token-calculator.py --scenario refactoring --json > output.json
        cat output.json
        python3 -c "import json; json.load(open('output.json'))"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      if: always()
