name: Efficiency Report
description: Share measured or observed context-efficiency data
title: "[Metrics]: "
labels: ["metrics", "user-feedback"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Share real usage data. Modeled calculator output is helpful context, but this template is for observed session results.

  - type: input
    id: workflow
    attributes:
      label: Workflow Type
      placeholder: "e.g., Python debugging, React feature, docs update"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Claude Code version, OS, project language"
    validations:
      required: true

  - type: dropdown
    id: skills-used
    attributes:
      label: Which skills did you use?
      multiple: true
      options:
        - slim-read
        - distill
        - limit-watch
        - None / baseline
    validations:
      required: true

  - type: textarea
    id: measurements
    attributes:
      label: Measurements
      description: Include real token counts if you have them. Estimates are okay if labeled.
      placeholder: |
        Messages:
        Duration:
        Files inspected:
        Full reads avoided:
        Token data, if measured:

  - type: textarea
    id: comparison
    attributes:
      label: Comparison to Normal Workflow
      description: What changed compared with how you normally use Claude Code?
    validations:
      required: true

  - type: textarea
    id: quality
    attributes:
      label: Quality Impact
      description: Did the workflow improve, preserve, or hurt Claude's answer quality?
    validations:
      required: true

  - type: textarea
    id: pain-points
    attributes:
      label: Pain Points
      description: What failed or felt awkward?

  - type: checkboxes
    id: permissions
    attributes:
      label: Usage Permissions
      options:
        - label: You may quote this report publicly with attribution.
        - label: You may use this report anonymously in validation summaries.
